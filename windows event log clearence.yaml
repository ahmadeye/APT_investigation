title: Detect Windows Event Log Clearance
id: 11111111-2222-3333-4444-555555555555
status: experimental
description: Detects the clearing of Windows event logs using wevtutil, which is a common anti-forensics technique.
author: Intern (Allied Software Engineers)
date: 2026/07/13
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID: 4688 # Process Creation
        NewProcessName|endswith: '\wevtutil.exe'
        CommandLine|contains: ' cl '
    condition: selection
falsepositives:
    - Administrative scripts (rare)
level: high